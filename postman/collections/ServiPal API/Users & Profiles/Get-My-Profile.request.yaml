$kind: http-request
name: Get My Profile
method: GET
url: '{{baseUrl}}/api/v1/users/me/profile'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 401", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 401]);
      });
      if (pm.response.code === 200) {
        pm.test("Profile response is an object", () => {
          const res = pm.response.json();
          const profile = res.profile || res.data || res;
          pm.expect(profile).to.be.an("object");
        });
        pm.test("Profile has required fields", () => {
          const res = pm.response.json();
          const profile = res.profile || res.data || res;
          pm.expect(profile).to.have.property("email");
        });
      }

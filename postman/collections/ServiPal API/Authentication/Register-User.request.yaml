$kind: http-request
name: Register User
method: POST
url: '{{baseUrl}}/api/v1/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "password": "SecurePass123!",
      "first_name": "Test",
      "last_name": "User",
      "phone_number": "+2348012345678"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201 or 400 or 409", () => {
        pm.expect(pm.response.code).to.be.oneOf([201, 200, 400, 409, 422]);
      });
      if (pm.response.code === 201 || pm.response.code === 200) {
        pm.test("Registration returns user object", () => {
          const res = pm.response.json();
          pm.expect(res).to.be.an("object");
          const user = res.user || res.data || res;
          pm.expect(user).to.have.property("email");
        });
        pm.test("Response contains access token or OTP message", () => {
          const res = pm.response.json();
          const hasToken = res.access_token || (res.data && res.data.access_token);
          const hasMessage = res.message;
          pm.expect(hasToken || hasMessage).to.exist;
        });
      }
      if (pm.response.code === 409) {
        pm.test("Duplicate email returns 409", () => {
          pm.expect(pm.response.code).to.eql(409);
        });
      }

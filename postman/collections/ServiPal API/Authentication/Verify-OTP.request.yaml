$kind: http-request
name: Verify OTP
method: POST
url: '{{baseUrl}}/api/v1/auth/verify-otp'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "otp": "123456"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 400 or 422", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 400, 422]);
      });
      if (pm.response.code === 200) {
        pm.test("OTP verification returns success message or token", () => {
          const res = pm.response.json();
          const hasToken = res.access_token || (res.data && res.data.access_token);
          const hasMessage = res.message;
          pm.expect(hasToken || hasMessage).to.exist;
        });
      }
      if (pm.response.code === 400 || pm.response.code === 422) {
        pm.test("Invalid OTP returns error detail", () => {
          const res = pm.response.json();
          const msg = res.detail || res.message || res.error;
          pm.expect(msg).to.exist;
        });
      }

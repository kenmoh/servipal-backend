$kind: http-request
name: Create Product Listing
method: POST
url: '{{baseUrl}}/api/v1/marketplace/products'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Product",
      "description": "A test product listing",
      "price": 5000.00,
      "category": "electronics",
      "quantity": 10,
      "images": []
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201 or 400 or 401 or 422", () => {
        pm.expect(pm.response.code).to.be.oneOf([201, 200, 400, 401, 422]);
      });
      if (pm.response.code === 201 || pm.response.code === 200) {
        pm.test("Product listing created with id", () => {
          const res = pm.response.json();
          const product = res.product || res.data || res;
          const productId = product.id || product.product_id;
          pm.expect(productId).to.exist;
        });
        pm.test("Product has name and price", () => {
          const res = pm.response.json();
          const product = res.product || res.data || res;
          pm.expect(product).to.have.property("name");
          const price = product.price !== undefined ? product.price : product.amount;
          pm.expect(price).to.not.be.undefined;
        });
        const res = pm.response.json();
        const product = res.product || res.data || res;
        const productId = product.id || product.product_id;
        if (productId) {
          pm.environment.set("productId", productId);
        }
      }

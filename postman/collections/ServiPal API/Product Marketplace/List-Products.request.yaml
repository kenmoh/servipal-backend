$kind: http-request
name: List Products
method: GET
url: '{{baseUrl}}/api/v1/marketplace/products'
order: 1000
queryParams:
  - key: page
    value: '1'
  - key: page_size
    value: '20'
  - key: category
    value: ''
  - key: search
    value: ''
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 401", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 401]);
      });
      if (pm.response.code === 200) {
        pm.test("Returns products list", () => {
          const res = pm.response.json();
          const items = res.items || res.data || res.products || (Array.isArray(res) ? res : []);
          pm.expect(items).to.be.an("array");
        });
        pm.test("Each product has id, name, and price", () => {
          const res = pm.response.json();
          const items = res.items || res.data || res.products || (Array.isArray(res) ? res : []);
          items.forEach(product => {
            pm.expect(product).to.have.property("id");
            pm.expect(product).to.have.property("name");
            const price = product.price !== undefined ? product.price : product.amount;
            pm.expect(price).to.not.be.undefined;
          });
        });
      }

$kind: http-request
name: Place Food Order
method: POST
url: '{{baseUrl}}/api/v1/food/orders'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "vendor_id": "{{vendorId}}",
      "items": [
        {
          "item_id": "{{itemId}}",
          "quantity": 2,
          "special_instructions": "No onions"
        }
      ],
      "delivery_address": "123 Test Street, Lagos",
      "payment_method": "wallet"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201 or 400 or 401 or 422", () => {
        pm.expect(pm.response.code).to.be.oneOf([201, 200, 400, 401, 422]);
      });
      if (pm.response.code === 201 || pm.response.code === 200) {
        pm.test("Order created with id", () => {
          const res = pm.response.json();
          const order = res.order || res.data || res;
          const orderId = order.id || order.order_id;
          pm.expect(orderId).to.exist;
        });
        pm.test("Order has status field", () => {
          const res = pm.response.json();
          const order = res.order || res.data || res;
          pm.expect(order).to.have.property("status");
        });
        const res = pm.response.json();
        const order = res.order || res.data || res;
        const orderId = order.id || order.order_id;
        if (orderId) {
          pm.environment.set("foodOrderId", orderId);
        }
      }
      if (pm.response.code === 422) {
        pm.test("Validation error has detail", () => {
          const res = pm.response.json();
          pm.expect(res.detail || res.message).to.exist;
        });
      }

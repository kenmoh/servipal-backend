$kind: http-request
name: List My Food Orders
method: GET
url: '{{baseUrl}}/api/v1/food/orders'
order: 4000
queryParams:
  - key: page
    value: '1'
  - key: page_size
    value: '20'
  - key: status
    value: ''
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 401", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 401]);
      });
      if (pm.response.code === 200) {
        pm.test("Returns food orders list", () => {
          const res = pm.response.json();
          const items = res.items || res.data || res.orders || (Array.isArray(res) ? res : []);
          pm.expect(items).to.be.an("array");
        });
        pm.test("Each order has id and status", () => {
          const res = pm.response.json();
          const items = res.items || res.data || res.orders || (Array.isArray(res) ? res : []);
          items.forEach(order => {
            const orderId = order.id || order.order_id;
            pm.expect(orderId).to.exist;
            pm.expect(order).to.have.property("status");
          });
        });
      }

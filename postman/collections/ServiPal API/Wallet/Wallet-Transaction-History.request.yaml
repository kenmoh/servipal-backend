$kind: http-request
name: Wallet Transaction History
method: GET
url: '{{baseUrl}}/api/v1/wallet/transfers'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 401", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 401]);
      });
      if (pm.response.code === 200) {
        pm.test("Response contains transactions list", () => {
          const res = pm.response.json();
          const transactions = res.transactions || res.data || res.results || res;
          pm.expect(Array.isArray(transactions)).to.be.true;
        });
        pm.test("Each transaction has required fields", () => {
          const res = pm.response.json();
          const transactions = res.transactions || res.data || res.results || res;
          if (transactions.length > 0) {
            transactions.forEach((tx) => {
              pm.expect(tx).to.have.property("amount");
              const txType = tx.type || tx.transaction_type;
              pm.expect(txType).to.exist;
              const txStatus = tx.status || tx.state;
              pm.expect(txStatus).to.exist;
            });
          }
        });
      }

$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/internal/process-payments'
order: 1000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
  - key: X-Internal-API-Key
    value: '{{internalApiKey}}'
body:
  type: json
  content: |-
    {
      "order_id": "{{orderId}}",
      "order_type": "FOOD",
      "amount": 1500.00,
      "tx_ref": "servipal_internal_123"
    }

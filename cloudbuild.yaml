steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/servipal-repo/servipal-backend:latest', '.']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/servipal-repo/servipal-backend:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'servipal-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/servipal-repo/servipal-backend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=ENABLE_WORKER=false,SUPABASE_URL=${_SUPABASE_URL},SUPABASE_PUBLISHABLE_KEY=${_SUPABASE_PUBLISHABLE_KEY},FLUTTERWAVE_PUBLIC_KEY=${_FLUTTERWAVE_PUBLIC_KEY},FLUTTERWAVE_BASE_URL=${_FLUTTERWAVE_BASE_URL},ENVIRONMENT=production'
      - '--set-secrets=SUPABASE_SECRET_KEY=SUPABASE_SECRET_KEY:latest,FLW_SECRET_KEY=FLW_SECRET_KEY:latest,FLW_SECRET_HASH=FLW_SECRET_HASH:latest,FLW_PROD_SECRET_KEY=FLW_PROD_SECRET_KEY:latest,UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest,LOGFIRE_TOKEN=LOGFIRE_TOKEN:latest,SENTRY_DSN=SENTRY_DSN:latest,INTERNAL_API_KEY=INTERNAL_API_KEY:latest'
      - '--memory=1Gi'
      - '--timeout=300'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/servipal-repo/servipal-backend:latest'

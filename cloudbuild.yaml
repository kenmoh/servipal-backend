steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/servipal-repo/servipal-backend:latest', '.']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/servipal-repo/servipal-backend:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'servipal-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/servipal-repo/servipal-backend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=ENABLE_WORKER=false,SUPABASE_URL=${_SUPABASE_URL},SUPABASE_PUBLISHABLE_KEY=${_SUPABASE_PUBLISHABLE_KEY},SUPABASE_SECRET_KEY=${_SUPABASE_SECRET_KEY},SUPABASE_STORAGE_BUCKET_URL=${_SUPABASE_STORAGE_BUCKET_URL},FLW_SECRET_KEY=${_FLW_SECRET_KEY},FLW_SECRET_HASH=${_FLW_SECRET_HASH},FLUTTERWAVE_PUBLIC_KEY=${_FLUTTERWAVE_PUBLIC_KEY},FLUTTERWAVE_BASE_URL=${_FLUTTERWAVE_BASE_URL},FLW_PROD_SECRET_KEY=${_FLW_PROD_SECRET_KEY},REDIS_URL=${_REDIS_URL},LOGFIRE_TOKEN=${_LOGFIRE_TOKEN},SENTRY_DSN=${_SENTRY_DSN},INTERNAL_API_KEY=${_INTERNAL_API_KEY}'
      - '--memory=1Gi'
      - '--timeout=300'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/servipal-repo/servipal-backend:latest'

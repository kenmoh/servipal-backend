

version: "3.8"

services:
  api:
    build:
      context: .
    container_name: fastapi-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-servipal}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/${RABBITMQ_DEFAULT_VHOST:-servipal}
      CELERY_RESULT_BACKEND: rpc://
    networks:
      - app_net

networks:
  app_net:
    driver: bridge 

